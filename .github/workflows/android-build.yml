name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "Android build number (integer)"
        required: false
        default: "1"
        type: string

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.buildFormat }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        buildFormat: [APK, AAB]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # Free extra disk on the runner — Unity + Android SDK is ~15 GB
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc
          df -h

      # Decode keystore from base64 secret to runner temp directory
      - name: Decode Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/user.keystore"
          echo "Keystore decoded to $RUNNER_TEMP/user.keystore"
          ls -la "$RUNNER_TEMP/user.keystore"
          file "$RUNNER_TEMP/user.keystore"

      # Create Unity cache directory in workspace (not /root)
      - name: Create Unity cache directory
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.unity-cache"
          chmod -R 777 "$GITHUB_WORKSPACE/.unity-cache"

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_NAME: ${{ runner.temp }}/user.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
          HOME: ${{ github.workspace }}
          XDG_CACHE_HOME: ${{ github.workspace }}/.unity-cache
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: Android
          androidExportType: ${{ matrix.buildFormat == 'AAB' && 'androidAppBundle' || 'androidPackage' }}
          buildMethod: BuildScript.BuildAndroid
          buildsPath: Builds
          allowDirtyBuild: true
          customParameters: >-
            -customBuildVersion ${{ github.event.inputs.version_name || '1.0.0' }}
            -androidVersionCode ${{ github.event.inputs.build_number || github.run_number }}

      - name: List build outputs
        if: always()
        run: ls -la Builds/ || true

      - name: Upload Editor.log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-log-${{ matrix.buildFormat }}
          path: |
            ${{ github.workspace }}/.config/unity3d/Editor.log
            ${{ github.workspace }}/**/Editor.log
            ${{ github.workspace }}/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.buildFormat }}
          path: Builds/Android/
          if-no-files-found: error
          retention-days: 14
