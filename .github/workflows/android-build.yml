name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "Android build number (integer)"
        required: false
        default: "1"
        type: string

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.buildFormat }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        buildFormat: [APK, AAB]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # Free extra disk on the runner — Unity + Android SDK is ~15 GB
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc
          df -h

      # Create Unity cache directory in workspace (not /root)
      - name: Create Unity cache directory
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.unity-cache"
          chmod -R 777 "$GITHUB_WORKSPACE/.unity-cache"

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          HOME: ${{ github.workspace }}
          XDG_CACHE_HOME: ${{ github.workspace }}/.unity-cache
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: Android
          androidExportType: ${{ matrix.buildFormat == 'AAB' && 'androidAppBundle' || 'androidPackage' }}
          buildMethod: BuildScript.BuildAndroid
          buildsPath: Builds
          allowDirtyBuild: true
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
          customParameters: >-
            -customBuildVersion ${{ github.event.inputs.version_name || '1.0.0' }}
            -androidVersionCode ${{ github.event.inputs.build_number || github.run_number }}

      - name: List build outputs
        if: always()
        run: ls -la Builds/ || true

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.buildFormat }}
          path: Builds/Android/
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.buildFormat }}
          path: |
            Builds/
            *.log
          if-no-files-found: warn
          retention-days: 7

  notify:
    name: Slack Notification
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=Success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: |
          COMMIT_MSG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}" \
            | jq -r '.commit.message' | head -n1)
          echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.status.outputs.emoji }} Android Build ${{ steps.status.outputs.text }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ steps.status.outputs.short_sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Actor:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Event:*\n${{ github.event_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ steps.status.outputs.text }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Commit Message:*\n${{ steps.commit.outputs.message }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run & Artifacts>"
                  }
                }
              ]
            }
